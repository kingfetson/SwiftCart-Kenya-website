<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwiftCart Kenya</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 id="storeName"></h2>

  <div class="nav-links">
    <button onclick="filterProducts('all')">Home</button>
    <button onclick="filterProducts('fashion')">Fashion</button>
    <button onclick="filterProducts('electronics')">Electronics</button>
    <button onclick="filterProducts('accessories')">Accessories</button>
  </div>

  <div class="cart-icon" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>🔥 Best Deals in Kenya</h1>
  <p>Fast Delivery | Pay via M-Pesa</p>
  <div class="countdown">Ends in: <span id="timer"></span></div>
</section>

<!-- PRODUCTS -->
<section class="products" id="productContainer"></section>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCart()">&times;</span>
    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <p>Total: KES <span id="cartTotal"></span></p>

    <button onclick="openCheckout()">Proceed to Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div id="checkout" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCheckout()">&times;</span>
    <h2>Checkout</h2>

    <input id="name" placeholder="Full Name" />
    <input id="phone" placeholder="07XXXXXXXX" />
    <input id="location" placeholder="Location" />

    <button onclick="submitOrder()">Place Order</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 SwiftCart Kenya</p>
</footer>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
